name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      # Uncomment this line to enable task distribution
      # - run: npx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="build"

      # Cache node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      # NEW STEP: Automatically creates localized .env files from templates inside the runner
      - name: Instantiate environment files from examples
        run: |
          echo "Replicating environment configuration templates..."
          for app in apps/*; do
            if [ -d "$app" ] && [ -f "$app/.env.example" ]; then
              cp "$app/.env.example" "$app/.env"
              echo "✅ Created $app/.env from template"
            fi
          done

      # Prepend any command with "nx record --" to record its logs to Nx Cloud
      # - run: npx nx record -- echo Hello World
      - run: npx nx run-many -t lint test build
