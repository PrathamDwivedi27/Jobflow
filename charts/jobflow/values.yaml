global:
  imagePullPolicy: Always

pulsar:
  namespace: pulsar
  namespaceCreate: true
  standalone:
    enabled: true
  zookeeper:
    replicaCount: 1
    podMonitor:
      enabled: false
  broker:
    replicaCount: 1
    podMonitor:
      enabled: false
  bookkeeper:
    replicaCount: 1
    podMonitor:
      enabled: false
  proxy:
    replicaCount: 1
    podMonitor:
      enabled: false
  autorecovery:
    podMonitor:
      enabled: false
  kube-prometheus-stack:
    enabled: false
    prometheusOperator:
      enabled: false
    grafana:
      enabled: false
    alertmanager:
      enabled: false
    prometheus:
      enabled: false

postgresql: 
  namespaceOverride: postgresql
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 17.1.0-debian-12-r0
  auth: 
    username: postgres
    password: postgres
  primary:
    initdb:
      scripts:
        create-dbs.sql:
          CREATE DATABASE auth;
          CREATE DATABASE products;


jobs:
  enabled: true
  replicas: 1
  image: '274414892749.dkr.ecr.ap-south-2.amazonaws.com/jobflow/jobs:latest'
  port:
    http: 3001

executor:
  enabled: true
  replicas: 1
  image: '274414892749.dkr.ecr.ap-south-2.amazonaws.com/jobflow/executor:latest'
  port:
    http: 3002

auth:
  enabled: true
  replicas: 1
  image: '274414892749.dkr.ecr.ap-south-2.amazonaws.com/jobflow/auth:latest'
  port:
    http: 3000
    grpc: 5000
  jwt:
    secret: dOFl9XLzc5nr2eiapqOhW8o1
    expirationMs: "28800000"

products:
  enabled: true
  replicas: 1
  image: '274414892749.dkr.ecr.ap-south-2.amazonaws.com/jobflow/products:latest'
  port:
    http: 3003
    grpc: 5001

