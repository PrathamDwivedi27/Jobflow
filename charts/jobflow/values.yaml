global:
  imagePullPolicy: Always

pulsar:
  namespace: pulsar
  namespaceCreate: true
  zookeeper:
    replicaCount: 1
    podMonitor:
      enabled: false
  broker:
    replicaCount: 1
    podMonitor:
      enabled: false
  bookkeeper:
    replicaCount: 1
    podMonitor:
      enabled: false
  proxy:
    replicaCount: 1
    podMonitor:
      enabled: false
  autorecovery:
    podMonitor:
      enabled: false
  kube-prometheus-stack:
    enabled: false
    prometheusOperator:
      enabled: false
    grafana:
      enabled: false
    alertmanager:
      enabled: false
    prometheus:
      enabled: false

postgresql: 
  namespaceOverride: postgresql
  auth: 
    username: postgres
    password: postgres
    database: jobflow


jobs:
  enabled: true
  replicas: 1
  image: '274414892749.dkr.ecr.ap-south-2.amazonaws.com/jobflow/jobs:latest'
  port:
    http: 3001

